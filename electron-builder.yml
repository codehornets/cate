appId: com.cate.app
productName: Cate
directories:
  output: release
asarUnpack:
  - "node_modules/@earendil-works/**"
  - "node_modules/.bin/pi"
  - "node_modules/.bin/pi.cmd"
extraResources:
  # Ship bundled pi extensions (e.g. cate-plan-mode) into the packaged app so
  # installPlanModeExtension can copy them into ~/.pi/agent/extensions/ on
  # first use. The src/ tree itself isn't packaged, so we mirror the files
  # under resources/cate-extensions/.
  - from: src/agent/extensions
    to: cate-extensions
    filter:
      - "**/*"
publish:
  provider: github
  owner: 0-AI-UG
  repo: cate
  releaseType: release
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
linux:
  icon: build/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
